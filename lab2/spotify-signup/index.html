<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="signup-window">

            <div class="logo">Spotify</div>

            <h1 class="title">Sign up for free</h1>
            <div class="description">Create your account to start listening.</div>

            <form class="signup-section">

                <label for="email">Email address</label>
                <input id="email" type="email" placeholder="name@domain.com" required>
                <div class="after-input-text">We'll never share your email with anyone.</div>

                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Create a Password" required>
                <div class="after-input-text">Use 8+ characters for better security</div>


                <label for="username">Username</label>
                <input id="username" type="text" placeholder="Pick a display name" required>

                <label class="checkbox">
                    <input type="checkbox" required>
                    I agree to the <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&t" class="terms-link">Terms and Conditions</a>
                </label>

                <button type="submit" class="signup-button">Sign Up</button>

                <div class="alt-login">
                    Already have an account?
                    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&t">Log in</a>
                </div>

            </form>

        </section>
    </main>
</body>
</html>
